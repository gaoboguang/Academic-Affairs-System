<h2>先定位“复杂”来自哪里</h2>
<p class="subtitle">不用一次解决所有复杂度。先找最影响你日常使用的那一类，后面才能下刀更准。</p>

<div class="options">
  <div class="option" data-choice="nav" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>入口太多，找不到该去哪</h3>
      <p>左侧菜单、页签、高级工具、数据维护入口很多，使用时像在逛仓库。</p>
    </div>
  </div>
  <div class="option" data-choice="screen" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>单个页面信息太满</h3>
      <p>一个页面里指标、筛选、表格、解释、按钮、风险提示同时出现，阅读压力大。</p>
    </div>
  </div>
  <div class="option" data-choice="workflow" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>不知道下一步该做什么</h3>
      <p>系统功能都有，但老师不知道先导入、先筛选、先维护规则，还是先看报告。</p>
    </div>
  </div>
  <div class="option" data-choice="terms" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>专业术语和风险解释太重</h3>
      <p>候选、规则、样本年份、历史模拟、仅关注、数据健康等概念太密。</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="subtitle">也可以不点，直接在对话里说：最烦的是 A/B/C/D，或者说一个你刚才使用时卡住的具体页面。</p>
</div>
